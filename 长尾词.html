<script>
    // Configuration constants
    const CAROUSEL_CONFIG = {
        autoPlayInterval: 6000,
        debounceDelay: 250,
        throttleDelay: 16,
        dragThreshold: 50,
        skeletonDelay: 2000,
        progressUpdateInterval: 16,
        maxConcurrentImages: 3,
        intersectionRootMargin: '50px 0px',
        intersectionThreshold: 0.01
    };

    // Carousel state enumeration
    const CAROUSEL_STATES = {
        LOADING: 'loading',
        PLAYING: 'playing',
        PAUSED: 'paused',
        FINISHED: 'finished'
    };

    // Utility functions
    const debounce = (func, wait) => {
        let timeout;
        return function executedFunction(...args) {
            const later = () => {
                clearTimeout(timeout);
                func(...args);
            };
            clearTimeout(timeout);
            timeout = setTimeout(later, wait);
        };
    };

    const throttle = (func, limit) => {
        let inThrottle;
        return function () {
            const args = arguments;
            const context = this;
            if (!inThrottle) {
                func.apply(context, args);
                inThrottle = true;
                setTimeout(() => inThrottle = false, limit);
            }
        };
    };

    // Performance optimization: Use Intersection Observer for lazy image loading
    class LazyImageLoader {
        constructor(performanceMonitor = null) {
            this.performanceMonitor = performanceMonitor;
            this.observer = new IntersectionObserver(
                (entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            const img = entry.target;
                            this.loadImage(img);
                            this.observer.unobserve(img);
                        }
                    });
                },
                {
                    rootMargin: CAROUSEL_CONFIG.intersectionRootMargin,
                    threshold: CAROUSEL_CONFIG.intersectionThreshold
                }
            );
        }

        loadImage(img) {
            if (img.dataset.src) {
                const startTime = performance.now();
                img.src = img.dataset.src;
                img.classList.remove('lazy');
                img.classList.add('loaded');

                img.onload = () => {
                    const loadTime = performance.now() - startTime;
                    if (this.performanceMonitor) {
                        this.performanceMonitor.recordImageLoadTime(loadTime);
                    }

                    // Adjust container height after image loads
                    if (window.carousel && typeof window.carousel.adjustContainerHeight === 'function') {
                        setTimeout(() => {
                            window.carousel.adjustContainerHeight();
                        }, 100);
                    }
                };
            }
        }

        observe(img) {
            this.observer.observe(img);
        }

        disconnect() {
            this.observer.disconnect();
        }
    }

    // Performance optimization: Image preloader manager
    class ImagePreloader {
        constructor() {
            this.cache = new Map();
            this.loadingQueue = new Set();
            this.maxConcurrent = CAROUSEL_CONFIG.maxConcurrentImages;
            this.activeLoads = 0;
        }

        // Preload image
        async preload(url, priority = 'low') {
            if (this.cache.has(url)) {
                return Promise.resolve(this.cache.get(url));
            }

            if (this.loadingQueue.has(url)) {
                return this.waitForImage(url);
            }

            // Control concurrent loading
            if (this.activeLoads >= this.maxConcurrent) {
                await this.waitForSlot();
            }

            this.loadingQueue.add(url);
            this.activeLoads++;

            const promise = new Promise((resolve, reject) => {
                const img = new Image();

                img.onload = () => {
                    this.cache.set(url, img);
                    this.loadingQueue.delete(url);
                    this.activeLoads--;
                    resolve(img);
                };

                img.onerror = () => {
                    this.loadingQueue.delete(url);
                    this.activeLoads--;
                    reject(new Error(`Failed to load image: ${url}`));
                };

                // Performance optimization: Set image loading priority
                if (priority === 'high') {
                    img.fetchPriority = 'high';
                }

                img.src = url;
            });

            return promise;
        }

        // Wait for image to load
        waitForImage(url) {
            return new Promise((resolve) => {
                const checkInterval = setInterval(() => {
                    if (this.cache.has(url)) {
                        clearInterval(checkInterval);
                        resolve(this.cache.get(url));
                    }
                }, 100);
            });
        }

        // Wait for loading slot
        waitForSlot() {
            return new Promise((resolve) => {
                const checkInterval = setInterval(() => {
                    if (this.activeLoads < this.maxConcurrent) {
                        clearInterval(checkInterval);
                        resolve();
                    }
                }, 50);
            });
        }

        // Clear cache
        clearCache() {
            this.cache.clear();
            this.loadingQueue.clear();
            this.activeLoads = 0;
        }

        // Get cache statistics
        getCacheStats() {
            return {
                size: this.cache.size,
                loading: this.loadingQueue.size,
                activeLoads: this.activeLoads,
                urls: Array.from(this.cache.keys())
            };
        }
    }

    // Performance optimization: Performance monitor
    class PerformanceMonitor {
        constructor() {
            this.metrics = {
                slideTransitions: 0,
                imageLoadTimes: [],
                animationFrameRates: [],
                memoryUsage: [],
                errors: []
            };
            this.startTime = performance.now();
            this.frameCount = 0;
            this.lastFrameTime = performance.now();
        }

        // Record slide transition
        recordSlideTransition() {
            this.metrics.slideTransitions++;
            this.measureFrameRate();
        }

        // Record image load time
        recordImageLoadTime(loadTime) {
            this.metrics.imageLoadTimes.push(loadTime);
            // Keep only the last 100 records
            if (this.metrics.imageLoadTimes.length > 100) {
                this.metrics.imageLoadTimes.shift();
            }
        }

        // Record error
        recordError(error) {
            this.metrics.errors.push({
                timestamp: Date.now(),
                message: error.message,
                stack: error.stack
            });

            if (this.metrics.errors.length > 50) {
                this.metrics.errors.shift();
            }
        }

        // Measure frame rate
        measureFrameRate() {
            this.frameCount++;
            const now = performance.now();
            const deltaTime = now - this.lastFrameTime;

            if (deltaTime >= 1000) { // Calculate frame rate every second
                const fps = (this.frameCount * 1000) / deltaTime;
                this.recordFrameRate(fps);
                this.frameCount = 0;
                this.lastFrameTime = now;
            }
        }

        // Record animation frame rate
        recordFrameRate(fps) {
            this.metrics.animationFrameRates.push(fps);
            if (this.metrics.animationFrameRates.length > 60) {
                this.metrics.animationFrameRates.shift();
            }
        }

        // Record memory usage
        recordMemoryUsage() {
            if ('memory' in performance) {
                this.metrics.memoryUsage.push({
                    timestamp: Date.now(),
                    used: performance.memory.usedJSHeapSize,
                    total: performance.memory.totalJSHeapSize,
                    limit: performance.memory.jsHeapSizeLimit
                });

                if (this.metrics.memoryUsage.length > 100) {
                    this.metrics.memoryUsage.shift();
                }
            }
        }

        // Get performance report
        getPerformanceReport() {
            const totalTime = performance.now() - this.startTime;
            const avgImageLoadTime = this.metrics.imageLoadTimes.length > 0
                ? this.metrics.imageLoadTimes.reduce((a, b) => a + b, 0) / this.metrics.imageLoadTimes.length
                : 0;
            const avgFrameRate = this.metrics.animationFrameRates.length > 0
                ? this.metrics.animationFrameRates.reduce((a, b) => a + b, 0) / this.metrics.animationFrameRates.length
                : 0;

            return {
                totalTime: Math.round(totalTime),
                slideTransitions: this.metrics.slideTransitions,
                avgImageLoadTime: Math.round(avgImageLoadTime),
                avgFrameRate: Math.round(avgFrameRate * 100) / 100,
                memoryUsage: this.metrics.memoryUsage[this.metrics.memoryUsage.length - 1] || null,
                errorCount: this.metrics.errors.length
            };
        }

        // Clear metrics
        clear() {
            this.metrics = {
                slideTransitions: 0,
                imageLoadTimes: [],
                animationFrameRates: [],
                memoryUsage: [],
                errors: []
            };
            this.startTime = performance.now();
            this.frameCount = 0;
            this.lastFrameTime = performance.now();
        }
    }

    class HighlightsCarousel {
        constructor() {
            // State management
            this.state = CAROUSEL_STATES.LOADING;
            this.currentIndex = 0;
            this.isPaused = false;
            this.isDragging = false;
            this.startX = 0;
            this.currentX = 0;
            this.allPlayed = false;

            // Device detection
            this.isMobile = this.detectMobile();
            this.isTablet = this.detectTablet();

            // Timers and animations
            this.autoPlayTimer = null;
            this.progressRAF = null;
            this.progressStart = null;
            this.savedProgress = 0; // Saved progress percentage
            this.savedProgressStart = null; // Time when progress was saved
            this.progressCompleted = false; // Progress bar completion flag

            // DOM element cache
            this.domCache = new Map();
            this.wrapper = null;
            this.paginationList = null;
            this.pauseButton = null;
            this.pauseIcon = null;
            this.resetButton = null;
            this.skeletonContainer = null;
            this.bullets = null;
            this.slides = null;

            // Utility classes
            this.performanceMonitor = new PerformanceMonitor();
            this.lazyLoader = new LazyImageLoader(this.performanceMonitor);
            this.imagePreloader = new ImagePreloader();

            // Cache common values
            this.slidesLength = slidesData.length;

            // Debounce and throttle handling
            this.debouncedResize = debounce(this.handleResize.bind(this), CAROUSEL_CONFIG.debounceDelay);
            this.throttledTouchMove = throttle(this.handleTouchMove.bind(this), CAROUSEL_CONFIG.throttleDelay);

            // State handlers
            this.stateHandlers = {
                [CAROUSEL_STATES.LOADING]: this.handleLoadingState.bind(this),
                [CAROUSEL_STATES.PLAYING]: this.handlePlayingState.bind(this),
                [CAROUSEL_STATES.PAUSED]: this.handlePausedState.bind(this),
                [CAROUSEL_STATES.FINISHED]: this.handleFinishedState.bind(this)
            };

            this.init();
        }

        init() {
            try {
                this.cacheDOMElements();
                this.renderSlides();
                this.renderPagination();
                this.bindEvents();

                // Delay carousel display to show skeleton screen
                setTimeout(() => {
                    this.showCarousel();
                }, CAROUSEL_CONFIG.skeletonDelay);
            } catch (error) {
                this.showFallback();
            }
        }

        // Device detection methods
        detectMobile() {
            return window.innerWidth <= 768 || /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        }

        detectTablet() {
            return window.innerWidth > 768 && window.innerWidth <= 1024;
        }

        // Get image suitable for current device
        getImageForDevice(slide) {
            if (this.isMobile) {
                return slide.images.mobile || slide.images.desktop;
            } else if (this.isTablet) {
                return slide.images.tablet || slide.images.desktop;
            } else {
                return slide.images.desktop;
            }
        }

        // Dynamically adjust container height
        adjustContainerHeight() {
            if (this.isMobile || this.isTablet) {
                return; // Mobile and tablet maintain fixed height
            }

            const slides = this.wrapper.querySelectorAll('.one-swiper-slide');
            let maxHeight = 520; // Minimum height

            slides.forEach(slide => {
                const img = slide.querySelector('.highlight-image');
                if (img && img.complete && img.naturalHeight > 0) {
                    // Calculate appropriate height based on image aspect ratio
                    const aspectRatio = img.naturalWidth / img.naturalHeight;
                    const containerWidth = this.wrapper.offsetWidth;
                    const calculatedHeight = containerWidth / aspectRatio;

                    // Ensure height is within reasonable range
                    const finalHeight = Math.max(520, Math.min(800, calculatedHeight));
                    maxHeight = Math.max(maxHeight, finalHeight);
                }
            });

            // Apply calculated height
            this.wrapper.style.height = `${maxHeight}px`;

            // Update height of all slides
            slides.forEach(slide => {
                slide.style.height = `${maxHeight}px`;
            });
        }

        // Cache DOM elements
        cacheDOMElements() {
            this.wrapper = this.getCachedElement('#swiperWrapper');
            this.paginationList = this.getCachedElement('#paginationList');
            this.pauseButton = this.getCachedElement('#pauseButton');
            this.pauseIcon = this.getCachedElement('#pauseIcon');
            this.resetButton = this.getCachedElement('#resetButton');
            this.skeletonContainer = this.getCachedElement('#skeletonContainer');
        }

        // Get cached DOM element
        getCachedElement(selector) {
            if (!this.domCache.has(selector)) {
                const element = document.querySelector(selector);
                if (!element) {
                    throw new Error(`Element not found: ${selector}`);
                }
                this.domCache.set(selector, element);
            }
            return this.domCache.get(selector);
        }

        // State handlers
        handleLoadingState() {
            this.skeletonContainer.style.display = 'block';
        }

        handlePlayingState() {
            this.skeletonContainer.style.display = 'none';
            this.startAutoPlay();
            this.startProgressBar();
        }

        handlePausedState() {
            this.pauseAutoPlay();
            this.pauseProgressBar();
            // Save current progress
            this.saveCurrentProgress();
        }

        handleFinishedState() {
            this.pauseAutoPlay();
            this.pauseProgressBar();
            this.pauseButton.style.display = 'none';
            this.resetButton.style.display = 'inline-flex';
        }

        // Set state
        setState(newState) {
            if (this.stateHandlers[newState]) {
                this.state = newState;
                this.stateHandlers[newState]();
            }
        }

        // Fallback solution
        showFallback() {
            if (this.skeletonContainer) {
                this.skeletonContainer.innerHTML = `
                    <div class="fallback-content" style="text-align: center; padding: 40px;">
                        <p>Content temporarily unavailable</p>
                    </div>
                `;
            }
        }

        // Show carousel, hide skeleton screen
        showCarousel() {
            try {
                // Show carousel container
                const highlightsElement = document.getElementById('high-lights');
                if (highlightsElement) {
                    highlightsElement.classList.add('loaded');
                }

                // Update state to playing
                this.setState(CAROUSEL_STATES.PLAYING);
                this.updateActiveSlide();

                // Listen for window resize
                window.addEventListener('resize', this.debouncedResize);

                // Start memory monitoring
                this.startMemoryMonitoring();

                // Delay container height adjustment to ensure images are loaded
                setTimeout(() => {
                    this.adjustContainerHeight();
                }, 500);
            } catch (error) {
                this.performanceMonitor.recordError(error);
                this.showFallback();
            }
        }

        // Start memory monitoring
        startMemoryMonitoring() {
            this.memoryMonitorInterval = setInterval(() => {
                this.performanceMonitor.recordMemoryUsage();
            }, 30000); // Record memory usage every 30 seconds
        }

        // Handle window resize
        handleResize() {
            // Re-detect device type
            const wasMobile = this.isMobile;
            const wasTablet = this.isTablet;

            this.isMobile = this.detectMobile();
            this.isTablet = this.detectTablet();

            // If device type changes, re-render slides
            if (wasMobile !== this.isMobile || wasTablet !== this.isTablet) {
                this.renderSlides();
                this.updateActiveSlide();
            } else {
                this.updateActiveSlide();
            }

            // Adjust container height
            this.adjustContainerHeight();
        }

        renderSlides() {
            const fragment = document.createDocumentFragment();

            slidesData.forEach((slide, index) => {
                const slideElement = document.createElement('div');
                slideElement.className = `one-swiper-slide swiper-slide highlight-slide ${slide.theme}`;
                slideElement.dataset.index = index;

                // Use safe DOM creation to prevent XSS
                const img = document.createElement('img');
                img.className = 'highlight-image lazy';
                img.role = 'img';
                img.alt = slide.alt || '';

                // Select image based on device
                const imageUrl = this.getImageForDevice(slide);
                img.dataset.src = imageUrl || '';
                img.loading = 'lazy';

                const desc = document.createElement('div');
                desc.className = 'highlights-desc image-desc';
                desc.style.color = slide.textColor || '';

                const title = document.createElement('div');
                title.className = 'desc-title oop_font_title_sm';
                title.textContent = slide.title || '';

                const subtitle = document.createElement('div');
                subtitle.className = 'desc-sub-title oop_font_body';
                subtitle.textContent = slide.subtitle || '';

                const logo = document.createElement('div');
                logo.className = 'desc-logo';
                const logoImg = document.createElement('img');
                logoImg.className = 'one-image';
                logoImg.role = 'img';
                logoImg.alt = '';
                logoImg.src = 'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7';
                logoImg.loading = 'lazy';
                logo.appendChild(logoImg);

                desc.appendChild(title);
                desc.appendChild(subtitle);
                desc.appendChild(logo);

                slideElement.appendChild(img);
                slideElement.appendChild(desc);

                fragment.appendChild(slideElement);
            });

            this.wrapper.innerHTML = '';
            this.wrapper.appendChild(fragment);

            // Preload first image (high priority)
            if (slidesData.length > 0) {
                const firstImageUrl = this.getImageForDevice(slidesData[0]);
                this.imagePreloader.preload(firstImageUrl, 'high');
            }

            // Preload next image (medium priority)
            if (slidesData.length > 1) {
                const secondImageUrl = this.getImageForDevice(slidesData[1]);
                this.imagePreloader.preload(secondImageUrl, 'medium');
            }

            // Lazy load images
            this.wrapper.querySelectorAll('.highlight-image.lazy').forEach(img => {
                this.lazyLoader.observe(img);
            });
        }

        renderPagination() {
            const fragment = document.createDocumentFragment();

            slidesData.forEach((_, index) => {
                const li = document.createElement('li');
                const isActive = index === 0;
                li.className = `pagination-bullet ${isActive ? 'is--active' : ''}`;
                li.setAttribute('role', 'tab');
                li.setAttribute('aria-pressed', isActive);
                li.setAttribute('aria-label', `Go to slide ${index + 1} of ${this.slidesLength}`);
                li.setAttribute('tabindex', isActive ? '0' : '-1');
                li.innerHTML = `<div class="bar-progress" style="display:${isActive ? 'block' : 'none'}"></div>`;
                fragment.appendChild(li);
            });

            this.paginationList.innerHTML = '';
            this.paginationList.appendChild(fragment);

            this.bullets = this.paginationList.querySelectorAll('.pagination-bullet');
        }

        bindEvents() {
            try {
                // Use event delegation for pagination clicks
                this.paginationList.addEventListener('click', (e) => {
                    const bullet = e.target.closest('.pagination-bullet');
                    if (!bullet) return;

                    const index = Array.from(this.bullets).indexOf(bullet);
                    if (index !== -1) {
                        this.goToSlide(index);
                    }
                });

                // Pause button event
                this.pauseButton.addEventListener('click', () => {
                    if (this.state === CAROUSEL_STATES.FINISHED) return;
                    this.togglePause();
                });

                // Reset button event
                this.resetButton.addEventListener('click', () => {
                    this.resetCarousel();
                });

                // Keyboard events
                this.handleKeydownBound = this.handleKeydown.bind(this);
                document.addEventListener('keydown', this.handleKeydownBound);

                // Mouse events
                this.wrapper.addEventListener('mouseenter', () => {
                    if (this.state === CAROUSEL_STATES.PLAYING && !this.isPaused) {
                        this.setState(CAROUSEL_STATES.PAUSED);
                    }
                });

                this.wrapper.addEventListener('mouseleave', () => {
                    if (this.state === CAROUSEL_STATES.PAUSED && !this.isPaused) {
                        this.setState(CAROUSEL_STATES.PLAYING);
                    }
                });

                // Touch events
                this.bindTouchEvents();

                // Mouse drag events
                this.bindMouseEvents();
            } catch (error) {
                this.performanceMonitor.recordError(error);
            }
        }


        // Handle keyboard events
        handleKeydown(e) {
            switch (e.key) {
                case 'ArrowLeft':
                    this.prevSlide();
                    break;
                case 'ArrowRight':
                    this.nextSlide();
                    break;
                case ' ':
                    e.preventDefault();
                    if (!this.allPlayed) {
                        this.togglePause();
                    }
                    break;
            }
        }

        // Bind touch events
        bindTouchEvents() {
            this.wrapper.addEventListener('touchstart', (e) => {
                this.startX = e.touches[0].clientX;
                this.isDragging = true;
            }, { passive: true });

            this.wrapper.addEventListener('touchmove', this.throttledTouchMove, { passive: true });

            this.wrapper.addEventListener('touchend', () => {
                this.isDragging = false;
            }, { passive: true });
        }

        // Handle touch move
        handleTouchMove(e) {
            if (!this.isDragging) return;

            const diff = e.touches[0].clientX - this.startX;

            if (Math.abs(diff) > CAROUSEL_CONFIG.dragThreshold) {
                if (diff < 0) {
                    this.nextSlide();
                } else {
                    this.prevSlide();
                }
                this.isDragging = false;
            }
        }

        // Bind mouse events
        bindMouseEvents() {
            let dragStartX = null;
            let dragging = false;

            this.wrapper.addEventListener('mousedown', (e) => {
                dragStartX = e.clientX;
                dragging = true;
            });

            document.addEventListener('mousemove', (e) => {
                if (!dragging) return;

                const diff = e.clientX - dragStartX;

                if (Math.abs(diff) > CAROUSEL_CONFIG.dragThreshold) {
                    if (diff < 0) {
                        this.nextSlide();
                    } else {
                        this.prevSlide();
                    }
                    dragging = false;
                }
            });

            document.addEventListener('mouseup', () => {
                dragging = false;
            });
        }

        nextSlide() {
            try {
                // If currently in finished state, reset to playing state first
                if (this.state === CAROUSEL_STATES.FINISHED) {
                    this.setState(CAROUSEL_STATES.PLAYING);
                    this.isPaused = false; // Reset manual pause flag
                    this.allPlayed = false;

                    // Update UI display
                    this.pauseButton.style.display = 'inline-flex';
                    this.resetButton.style.display = 'none';
                    this.pauseButton.classList.remove('paused');
                    this.pauseButton.setAttribute('aria-label', 'Pause carousel');
                    this.pauseIcon.innerHTML = this.getPauseSVG();

                }

                if (this.currentIndex === this.slidesLength - 1) {
                    this.setState(CAROUSEL_STATES.FINISHED);
                    return;
                }

                this.currentIndex = (this.currentIndex + 1) % this.slidesLength;
                this.updateActiveSlide();
                this.resetAutoPlay();
                this.startProgressBar();

                // Intelligently preload next image
                this.preloadNextImages();

                // Record performance metrics
                this.performanceMonitor.recordSlideTransition();
            } catch (error) {
                this.performanceMonitor.recordError(error);
            }
        }

        // Intelligently preload next images
        preloadNextImages() {
            const nextIndex = (this.currentIndex + 1) % this.slidesLength;
            const afterNextIndex = (this.currentIndex + 2) % this.slidesLength;

            // Preload next image
            if (slidesData[nextIndex]) {
                const nextImageUrl = this.getImageForDevice(slidesData[nextIndex]);
                this.imagePreloader.preload(nextImageUrl, 'medium');
            }

            // Preload image after next
            if (slidesData[afterNextIndex]) {
                const afterNextImageUrl = this.getImageForDevice(slidesData[afterNextIndex]);
                this.imagePreloader.preload(afterNextImageUrl, 'low');
            }
        }

        prevSlide() {
            try {
                if (this.state === CAROUSEL_STATES.FINISHED) {
                    // Switch from finished state to playing state
                    this.setState(CAROUSEL_STATES.PLAYING);
                    this.isPaused = false;
                    this.allPlayed = false;

                    // Update UI display
                    this.pauseButton.style.display = 'inline-flex';
                    this.resetButton.style.display = 'none';
                    this.pauseButton.classList.remove('paused');
                    this.pauseButton.setAttribute('aria-label', 'Pause carousel');
                    this.pauseIcon.innerHTML = this.getPauseSVG();

                    this.currentIndex = Math.max(0, this.currentIndex - 1);
                    this.updateActiveSlide();
                    this.startAutoPlay();
                    this.startProgressBar();

                    return;
                }

                this.currentIndex = (this.currentIndex - 1 + this.slidesLength) % this.slidesLength;
                this.updateActiveSlide();
                this.resetAutoPlay();
                this.startProgressBar();

                // Record performance metrics
                this.performanceMonitor.recordSlideTransition();
            } catch (error) {
                this.performanceMonitor.recordError(error);
            }
        }


        updateActiveSlide() {
            const translateX = -this.currentIndex * 100;
            this.wrapper.style.transform = `translate3d(${translateX}%, 0px, 0px)`;

            // Cache DOM query results to avoid repeated queries
            if (!this.bullets) {
                this.bullets = this.paginationList.querySelectorAll('.pagination-bullet');
            }
            if (!this.slides) {
                this.slides = this.wrapper.querySelectorAll('.one-swiper-slide');
            }

            // Use batch DOM operations for performance optimization
            this.updateBullets();
            this.updateSlides();
        }

        // Batch update pagination indicators
        updateBullets() {
            const fragment = document.createDocumentFragment();
            const activeIndex = this.currentIndex;

            this.bullets.forEach((bullet, index) => {
                const isActive = index === activeIndex;
                const barProgress = bullet.querySelector('.bar-progress');

                // Batch update attributes
                bullet.classList.toggle('is--active', isActive);
                bullet.setAttribute('aria-pressed', isActive);
                bullet.setAttribute('aria-label', `Go to slide ${index + 1} of ${this.slidesLength}`);
                bullet.setAttribute('tabindex', isActive ? '0' : '-1');

                if (barProgress) {
                    barProgress.style.display = isActive ? 'block' : 'none';
                    barProgress.style.width = '0%';
                }
            });
        }

        // Batch update slides
        updateSlides() {
            const activeIndex = this.currentIndex;

            this.slides.forEach((slide, index) => {
                const isActive = index === activeIndex;
                slide.classList.toggle('swiper-slide-active', isActive);
                slide.classList.toggle('swiper-slide-prev', index === activeIndex - 1);
                slide.classList.toggle('swiper-slide-next', index === activeIndex + 1);

                // Add ARIA labels
                slide.setAttribute('aria-hidden', !isActive);
                slide.setAttribute('aria-label', `Slide ${index + 1} of ${this.slidesLength}`);
                slide.setAttribute('role', 'tabpanel');
            });

            // Update carousel container ARIA labels
            this.wrapper.setAttribute('aria-live', 'polite');
            this.wrapper.setAttribute('aria-label', `Carousel showing slide ${activeIndex + 1} of ${this.slidesLength}`);
        }

        togglePause() {
            if (this.state === CAROUSEL_STATES.PLAYING) {
                this.setState(CAROUSEL_STATES.PAUSED);
                this.isPaused = true; // Mark as manually paused
                this.pauseButton.classList.add('paused');
                this.pauseButton.setAttribute('aria-label', 'Resume carousel');
                this.pauseIcon.innerHTML = this.getPlaySVG();
            } else if (this.state === CAROUSEL_STATES.PAUSED) {
                this.setState(CAROUSEL_STATES.PLAYING);
                this.isPaused = false; // Mark as manually resumed
                this.pauseButton.classList.remove('paused');
                this.pauseButton.setAttribute('aria-label', 'Pause carousel');
                this.pauseIcon.innerHTML = this.getPauseSVG();
            }
        }

        // Get pause SVG
        getPauseSVG() {
            return `<svg xmlns='http://www.w3.org/2000/svg' width='20' height='20' viewBox='0 0 20 20' fill='none'><path d='M8.3698 16.2794C8.3698 16.591 8.11485 16.846 7.80325 16.846H5.57827C5.26667 16.846 5.01172 16.591 5.01172 16.2794V3.79068C5.01172 3.47907 5.26667 3.22412 5.57827 3.22412H7.80325C8.11485 3.22412 8.3698 3.47907 8.3698 3.79068V16.2794Z' fill='#2C2C2C'/><path d='M14.8464 16.2794C14.8464 16.591 14.5914 16.846 14.2798 16.846H12.0548C11.7432 16.846 11.4883 16.591 11.4883 16.2794V3.79068C11.4883 3.47907 11.7432 3.22412 12.0548 3.22412H14.2798C14.5914 3.22412 14.8464 3.47907 14.8464 3.79068V16.2794Z' fill='#2C2C2C'/></svg>`;
        }

        getPlaySVG() {
            return `<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 14 14' fill='none'><path d='M12.0686 6.27721L12.0689 6.27688L3.33612 0.288655L3.3334 0.29123C3.15246 0.119412 2.90699 0.0136719 2.63646 0.0136719C2.07996 0.0136719 1.62885 0.460319 1.62885 1.01167C1.62885 1.31448 1.6158 1.90736 1.62885 1.8945V6.99989V12.3739C1.62885 12.3784 1.62885 12.7191 1.62885 12.9883C1.62885 13.5393 2.07996 13.9859 2.63646 13.9859C2.90802 13.9859 3.15451 13.8795 3.33544 13.7061L3.33612 13.7065L12.0689 7.71844L12.0686 7.71791C12.2584 7.53648 12.3769 7.28193 12.3769 6.99971C12.3769 6.99902 12.3769 6.99851 12.3769 6.99765C12.3769 6.99697 12.3769 6.99613 12.3769 6.99561C12.3769 6.71336 12.2584 6.45863 12.0686 6.27721Z' fill='#222222'/></svg>`;
        }

        startAutoPlay() {
            if (this.autoPlayTimer || this.state === CAROUSEL_STATES.FINISHED) return;
            this.autoPlayTimer = setInterval(() => {
                this.nextSlide();
            }, CAROUSEL_CONFIG.autoPlayInterval);
        }

        pauseAutoPlay() {
            if (this.autoPlayTimer) {
                clearInterval(this.autoPlayTimer);
                this.autoPlayTimer = null;
            }
        }

        resetAutoPlay() {
            this.pauseAutoPlay();
            if (this.state === CAROUSEL_STATES.PLAYING) {
                this.startAutoPlay();
            }
        }

        // Save current progress
        saveCurrentProgress() {
            if (!this.bullets) return;

            const activeBullet = this.bullets[this.currentIndex];
            const bar = activeBullet.querySelector('.bar-progress');
            if (!bar) return;

            this.savedProgress = parseFloat(bar.style.width) || 0;
            this.savedProgressStart = performance.now();
        }

        // Progress bar animation
        startProgressBar() {
            if (!this.bullets || this.state === CAROUSEL_STATES.PAUSED) return;

            const activeBullet = this.bullets[this.currentIndex];
            const bar = activeBullet.querySelector('.bar-progress');
            if (!bar) return;

            // Reset progress bar completion flag
            this.progressCompleted = false;

            // If resuming from paused state, continue from saved progress
            if (this.savedProgress > 0 && this.savedProgressStart) {
                const remainingTime = CAROUSEL_CONFIG.autoPlayInterval * (1 - this.savedProgress / 100);
                this.progressStart = performance.now() - (CAROUSEL_CONFIG.autoPlayInterval - remainingTime);
                this.savedProgress = 0; // Reset saved progress
                this.savedProgressStart = null;
            } else {
                bar.style.width = '0%';
                this.progressStart = performance.now();
            }

            if (this.progressRAF) {
                cancelAnimationFrame(this.progressRAF);
            }

            const animate = (now) => {
                if (this.state === CAROUSEL_STATES.PAUSED) return;

                const elapsed = now - this.progressStart;
                const percent = Math.min(elapsed / CAROUSEL_CONFIG.autoPlayInterval, 1);

                bar.style.width = (percent * 100) + '%';

                if (percent < 1) {
                    this.progressRAF = requestAnimationFrame(animate);
                } else {
                    bar.style.width = '100%';
                    // Immediately trigger next slide when progress completes, avoid duplicate triggers
                    if (!this.progressCompleted) {
                        this.progressCompleted = true;
                        this.nextSlide();
                    }
                }
            };

            this.progressRAF = requestAnimationFrame(animate);
        }

        pauseProgressBar() {
            if (this.progressRAF) {
                cancelAnimationFrame(this.progressRAF);
                this.progressRAF = null;
            }
        }

        resumeProgressBar() {
            const activeBullet = this.bullets[this.currentIndex];
            const bar = activeBullet.querySelector('.bar-progress');
            if (!bar) return;

            const currentWidth = parseFloat(bar.style.width) || 0;
            const percent = currentWidth / 100;
            this.progressStart = performance.now() - percent * CAROUSEL_CONFIG.autoPlayInterval;

            if (this.progressRAF) {
                cancelAnimationFrame(this.progressRAF);
            }

            const animate = (now) => {
                if (this.state === CAROUSEL_STATES.PAUSED) return;

                const elapsed = now - this.progressStart;
                const percent = Math.min(elapsed / CAROUSEL_CONFIG.autoPlayInterval, 1);

                bar.style.width = (percent * 100) + '%';

                if (percent < 1) {
                    this.progressRAF = requestAnimationFrame(animate);
                } else {
                    bar.style.width = '100%';
                }
            };

            this.progressRAF = requestAnimationFrame(animate);
        }

        resetCarousel() {
            try {
                // Reset state
                this.setState(CAROUSEL_STATES.PLAYING);
                this.currentIndex = 0;
                this.isPaused = false; // Reset manual pause flag
                this.allPlayed = false;

                // Stop current autoplay and progress bar
                this.pauseAutoPlay();
                this.pauseProgressBar();

                // Update UI display
                this.updateActiveSlide();
                this.pauseButton.style.display = 'inline-flex';
                this.resetButton.style.display = 'none';
                this.pauseButton.classList.remove('paused');
                this.pauseButton.setAttribute('aria-label', 'Pause carousel');
                this.pauseIcon.innerHTML = this.getPauseSVG();

                // Restart autoplay and progress bar
                this.startAutoPlay();
                this.startProgressBar();

                // Record performance metrics
                this.performanceMonitor.recordSlideTransition();
            } catch (error) {
                this.performanceMonitor.recordError(error);
            }
        }

        goToSlide(index) {
            try {
                if (this.state === CAROUSEL_STATES.FINISHED) {
                    // Switch from finished state to playing state
                    this.setState(CAROUSEL_STATES.PLAYING);
                    this.currentIndex = index;
                    this.isPaused = false; // Reset manual pause flag
                    this.allPlayed = false;

                    // Update UI display
                    this.pauseButton.style.display = 'inline-flex';
                    this.resetButton.style.display = 'none';
                    this.pauseButton.classList.remove('paused');
                    this.pauseButton.setAttribute('aria-label', 'Pause carousel');
                    this.pauseIcon.innerHTML = this.getPauseSVG();

                    this.updateActiveSlide();
                    this.startAutoPlay();
                    this.startProgressBar();

                    return;
                }

                if (index === this.currentIndex) return;

                this.currentIndex = index;
                this.updateActiveSlide();
                this.resetAutoPlay();
                this.startProgressBar();

                // Record performance metrics
                this.performanceMonitor.recordSlideTransition();
            } catch (error) {
                this.performanceMonitor.recordError(error);
            }
        }

        // Clean up resources
        destroy() {
            try {
                this.pauseAutoPlay();
                this.pauseProgressBar();

                if (this.progressRAF) {
                    cancelAnimationFrame(this.progressRAF);
                    this.progressRAF = null;
                }

                // Clear memory monitoring timer
                if (this.memoryMonitorInterval) {
                    clearInterval(this.memoryMonitorInterval);
                    this.memoryMonitorInterval = null;
                }

                window.removeEventListener('resize', this.debouncedResize);

                // Clear keyboard event listeners
                if (this.handleKeydownBound) {
                    document.removeEventListener('keydown', this.handleKeydownBound);
                    this.handleKeydownBound = null;
                }

                if (this.lazyLoader) {
                    this.lazyLoader.disconnect();
                }

                if (this.imagePreloader) {
                    this.imagePreloader.clearCache();
                }

                // Clear DOM cache
                this.domCache.clear();

                // Reset state
                this.state = CAROUSEL_STATES.LOADING;
                this.currentIndex = 0;
                this.isPaused = false;
                this.isDragging = false;
                this.allPlayed = false;
            } catch (error) {
                // Silently handle cleanup errors
            }
        }
    }

    // WordPress environment detection and optimization
    function detectWordPressEnvironment() {
        // Detect WordPress environment
        const isWordPress = document.body.classList.contains('wp-admin') ||
            document.body.classList.contains('wordpress') ||
            window.location.href.includes('wp-admin') ||
            document.querySelector('meta[name="generator"][content*="WordPress"]');

        if (isWordPress) {
            // Add WordPress specific class name
            document.body.classList.add('wordpress-carousel');

            // Adjust container styles
            const container = document.querySelector('.highlights-container');
            if (container) {
                container.style.position = 'relative';
                container.style.zIndex = '1';
                container.style.width = '100vw';
                container.style.marginLeft = 'calc(-50vw + 50%)';
                container.style.marginRight = 'calc(-50vw + 50%)';
            }
        }
    }

    // Use DOMContentLoaded to ensure DOM is loaded
    document.addEventListener('DOMContentLoaded', () => {
        // Detect WordPress environment
        detectWordPressEnvironment();
        try {
            // Use namespace to avoid global pollution
            window.VertuCarousel = window.VertuCarousel || {};
                 window.HighlightsCarousel = HighlightsCarousel;
            
            window.VertuCarousel.highlights = new HighlightsCarousel();

            // Clean up resources on page unload
            window.addEventListener('beforeunload', () => {
                if (window.VertuCarousel.highlights && typeof window.VertuCarousel.highlights.destroy === 'function') {
                    window.VertuCarousel.highlights.destroy();
                }
            });

            // Pause carousel when page is hidden
            document.addEventListener('visibilitychange', () => {
                if (document.hidden) {
                    if (window.VertuCarousel.highlights.state === CAROUSEL_STATES.PLAYING) {
                        window.VertuCarousel.highlights.setState(CAROUSEL_STATES.PAUSED);
                    }
                } else {
                    if (window.VertuCarousel.highlights.state === CAROUSEL_STATES.PAUSED) {
                        window.VertuCarousel.highlights.setState(CAROUSEL_STATES.PLAYING);
                    }
                }
            });


        } catch (error) {
            // Show fallback content
            const skeletonContainer = document.getElementById('skeletonContainer');
            if (skeletonContainer) {
                skeletonContainer.innerHTML = `
                    <div class="fallback-content" style="text-align: center; padding: 40px;">
                        <p>Content temporarily unavailable</p>
                    </div>
                `;
            }
        }
    });
</script>
